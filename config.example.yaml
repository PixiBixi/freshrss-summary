# Auth credentials are stored in data/articles.db (table: users).
# On first run, a random admin password is printed to stdout.
# To set/reset the password: set ADMIN_PASSWORD env var before starting.
# ADMIN_USERNAME env var sets the username (default: admin).
#
# Session secret key — generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
# Set via SECRET_KEY env var or auth.secret_key in this file.
# auth:
#   secret_key: ""

freshrss:
  url: https://flux.jdelgado.fr        # overridable via FRESHRSS_URL
  username: your_username               # overridable via FRESHRSS_USERNAME
  api_password: your_api_password       # overridable via FRESHRSS_API_PASSWORD
  # FreshRSS API password (≠ login password).
  # Set it in FreshRSS → Settings → Authentication → API password.

database:
  # SQLAlchemy async URL — default: SQLite in data/articles.db
  # url: sqlite+aiosqlite:///./data/articles.db
  # url: mysql+aiomysql://user:pass@host:3306/freshrss
  # url: postgresql+asyncpg://user:pass@host:5432/freshrss
  # Overridable via DATABASE_URL env var.

server:
  host: 0.0.0.0       # overridable via SERVER_HOST
  port: 8123           # overridable via SERVER_PORT
  reload: false        # set to true for development (auto-restart on code change)
  log_level: info      # uvicorn log level: debug | info | warning | error

fetch:
  batch_size: 1000      # Articles fetched per FreshRSS API call
  max_batches: 10       # Max batches (= max 10 000 unread fetched)

scoring:
  title_weight: 3       # Title keyword matches multiplier
  min_score: 1          # Minimum score to include in results

