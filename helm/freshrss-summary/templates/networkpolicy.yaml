{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "freshrss-summary.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "freshrss-summary.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "freshrss-summary.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic only from the ingress controller namespace.
    # Adjust networkPolicy.ingressControllerNamespace and (optionally)
    # networkPolicy.ingressControllerPodSelector to match your cluster.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressControllerNamespace | quote }}
          {{- if .Values.networkPolicy.ingressControllerPodSelector }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressControllerPodSelector | nindent 14 }}
          {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}

  egress:
    # DNS resolution (CoreDNS / kube-dns)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS — outbound to FreshRSS and any external service
    - ports:
        - protocol: TCP
          port: 443
    {{- if gt (.Values.networkPolicy.dbPort | int) 0 }}
    # External database port (MySQL: 3306, PostgreSQL: 5432)
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.dbPort }}
    {{- end }}
{{- end }}
