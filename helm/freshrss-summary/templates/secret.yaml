{{- if not .Values.secret.existingSecret -}}
{{/*
Chart-managed Secret. Only created when existingSecret is not set.
For production, prefer managing this Secret via External Secrets Operator or
Vault Agent and set secret.existingSecret to the name of the pre-existing Secret.

Required keys:
  FRESHRSS_API_PASSWORD — FreshRSS API password (≠ login password)
  ADMIN_PASSWORD        — Web UI admin password
  SECRET_KEY            — Session signing key (generate with secrets.token_hex(32))

Optional keys:
  DATABASE_URL          — SQLAlchemy async URL (defaults to SQLite if absent)
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "freshrss-summary.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "freshrss-summary.labels" . | nindent 4 }}
type: Opaque
stringData:
  FRESHRSS_API_PASSWORD: {{ .Values.secret.freshrssApiPassword | required "secret.freshrssApiPassword is required when secret.existingSecret is not set" | quote }}
  ADMIN_PASSWORD: {{ .Values.secret.adminPassword | required "secret.adminPassword is required when secret.existingSecret is not set" | quote }}
  SECRET_KEY: {{ .Values.secret.secretKey | required "secret.secretKey is required when secret.existingSecret is not set" | quote }}
  {{- if .Values.secret.databaseUrl }}
  DATABASE_URL: {{ .Values.secret.databaseUrl | quote }}
  {{- end }}
{{- end }}
