{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "freshrss-summary.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "freshrss-summary.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Explicitly disable token auto-mounting — the app does not call the Kubernetes API.
automountServiceAccountToken: false
{{- end }}
