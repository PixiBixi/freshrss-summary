<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreshRSS Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <a href="#articles-grid" class="skip-link">Aller au contenu</a>

  <header>
    <!-- Row 1: identity + search + primary actions -->
    <div class="header-row-1">
      <div class="logo">📡 FreshRSS</div>

      <div class="search-wrap">
        <input id="search-input" class="search-input" type="text" placeholder="Rechercher…"
          autocomplete="off" aria-label="Rechercher des articles" />
        <button class="search-palette-hint" onclick="openPalette()" tabindex="-1"
          aria-label="Ouvrir la palette de commandes">⌘K</button>
      </div>

      <button id="search-read-btn" class="btn btn-ghost" onclick="markSearchAsRead()"
        style="display:none" data-i18n="btn.markSearch" aria-label="Marquer les résultats comme lus">✓ Tout lire</button>

      <button id="refresh-btn" class="btn btn-primary" onclick="triggerRefresh()"
        data-i18n="btn.refresh" aria-label="Rafraîchir les articles">⟳ Rafraîchir</button>

      <div class="overflow-wrap">
        <button class="overflow-btn" id="overflow-btn" onclick="toggleOverflowMenu()"
          aria-label="Plus d'options" aria-haspopup="true" aria-expanded="false">···</button>
        <div id="overflow-menu" class="overflow-menu" role="menu">

          <!-- Compact toggle -->
          <button class="overflow-item" id="compact-overflow-item" onclick="toggleCompact()" role="menuitem">
            ⊟ <span id="compact-label" data-i18n="palette.compact">Mode compact</span>
          </button>

          <!-- Rescore -->
          <button class="overflow-item" onclick="triggerRescore(); closeOverflowMenu()" role="menuitem">⇄ Re-scorer</button>

          <!-- Topics config -->
          <button class="overflow-item" onclick="openScoringModal(); closeOverflowMenu()" role="menuitem">⚙ Topics</button>

          <div class="overflow-sep"></div>

          <!-- Accent color picker -->
          <div class="overflow-color-row">
            <label for="accent-picker">🎨 Couleur d'accent</label>
            <input type="color" id="accent-picker" class="accent-picker" value="#5c98a0"
              oninput="setAccentColor(this.value)" aria-label="Couleur d'accent" />
            <button class="overflow-reset" onclick="resetAccentColor(event)">Reset</button>
          </div>

          <div class="overflow-sep"></div>

          <!-- Language list (populated by JS) -->
          <div id="overflow-lang"></div>

          <div class="overflow-sep"></div>

          <!-- Auth: shown when authenticated -->
          <div id="overflow-auth" style="display:none">
            <div class="overflow-username" id="auth-username"></div>
            <button class="overflow-item" onclick="openPwdModal(); closeOverflowMenu()" role="menuitem">🔑 Mot de passe</button>
            <button class="overflow-item" onclick="doLogout()" role="menuitem" data-i18n="btn.logout">Déconnexion</button>
          </div>

          <!-- Auth: shown when not authenticated -->
          <div id="overflow-login" style="display:none">
            <a href="/login" class="overflow-item" style="text-decoration:none" data-i18n="btn.login">Connexion</a>
          </div>

        </div>
      </div>
    </div>

    <!-- Row 2: filters + stats -->
    <div class="header-row-2">
      <select id="sort-select">
        <option value="score" data-i18n="sort.score">Score</option>
        <option value="date"  data-i18n="sort.date" selected>Date</option>
        <option value="feed"  data-i18n="sort.feed">Source</option>
      </select>
      <label class="score-label">
        <span data-i18n="label.minScore">Score min</span>
        <input id="min-score" type="range" value="1" min="0" max="200" step="5" />
        <span id="min-score-val">1</span>
      </label>
      <label class="score-label">
        <span data-i18n="label.period">Période</span>
        <select id="days-select">
          <option value="7"  selected data-i18n="period.7">7 j</option>
          <option value="14" data-i18n="period.14">14 j</option>
          <option value="30" data-i18n="period.30">30 j</option>
          <option value="0"  data-i18n="period.all">Tout</option>
        </select>
      </label>
      <button id="show-old-btn" class="btn btn-ghost" onclick="toggleShowRead()"
        data-i18n="btn.showRead" aria-label="Afficher les articles lus">⏪ Lu</button>
      <span class="filter-sep"></span>
      <div class="header-stats">
        <span id="last-refresh-label" class="last-refresh"></span>
        <span id="stats-badge" style="display:none">
          · <span id="showing-count">0</span>/<span id="total-count">0</span>
        </span>
      </div>
    </div>

    <!-- Topic pills -->
    <div id="topic-bar" class="topic-bar">
      <button class="pill active" id="pill-all" onclick="filterTopic(null)">Tous</button>
    </div>
  </header>

  <main>
    <div id="error-state" class="state-error"></div>

    <div id="empty-state" class="state-empty">
      <div class="state-empty-icon">📭</div>
      <p data-i18n="empty.title">Aucun article chargé.</p>
      <p data-i18n-html="empty.hint">Clique sur <strong>Rafraîchir</strong> pour fetcher tes flux.</p>
    </div>

    <div id="allread-state" class="state-allread" style="display:none">
      <div class="allread-icon">
        <div class="allread-ring"></div>
        <div class="allread-ring allread-ring-2"></div>
        <div class="allread-check">✓</div>
      </div>
      <p class="allread-title" data-i18n="allread.title">Tout lu !</p>
      <p class="allread-sub" data-i18n="allread.sub">Bravo, tu as tout rattrapé.</p>
    </div>

    <div id="articles-grid" tabindex="-1"></div>

    <div id="load-more-bar" class="load-more">
      <button class="btn btn-ghost" onclick="loadMore()" data-i18n="btn.loadMore">Charger plus</button>
    </div>
  </main>

  <div id="toast" class="hidden" role="status" aria-live="polite" aria-atomic="true">
    <div id="toast-spinner" class="spinner"></div>
    <span id="toast-text">Rafraîchissement...</span>
    <button id="toast-close" onclick="dismissToast()" aria-label="Fermer la notification"
      style="display:none;background:none;border:none;color:inherit;cursor:pointer;font-size:12px;margin-left:2px;padding:4px 6px;min-width:28px;min-height:28px">✕</button>
  </div>

  <!-- Hidden mark-read-btn for api.js compat -->
  <button id="mark-read-btn" style="display:none" disabled></button>

  <!-- ⌘K Command Palette -->
  <div id="cmd-palette" class="palette-overlay" style="display:none"
    role="dialog" aria-modal="true" aria-label="Palette de commandes">
    <div class="palette-modal" onclick="event.stopPropagation()">
      <div class="palette-search-bar">
        <span class="palette-key-hint">⌘K</span>
        <input id="palette-input" class="palette-input" type="text"
          placeholder="Rechercher une commande…" autocomplete="off" />
      </div>
      <div id="palette-list" class="palette-list"></div>
    </div>
  </div>

  <!-- Password change modal -->
  <div id="pwd-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="pwd-modal-title">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="pwd-modal-title" data-i18n="pwd.title">Changer le mot de passe</h2>
        <button class="modal-close btn btn-ghost btn-icon" onclick="closePwdModal()" aria-label="Fermer">✕</button>
      </div>
      <div class="modal-body">
        <div style="display:flex;flex-direction:column;gap:12px">
          <label style="display:flex;flex-direction:column;gap:4px;font-size:13px">
            <span data-i18n="pwd.current">Mot de passe actuel</span>
            <input id="pwd-current" type="password" class="search-input" autocomplete="current-password" />
          </label>
          <label style="display:flex;flex-direction:column;gap:4px;font-size:13px">
            <span data-i18n="pwd.new">Nouveau mot de passe</span>
            <input id="pwd-new" type="password" class="search-input" autocomplete="new-password" />
          </label>
          <label style="display:flex;flex-direction:column;gap:4px;font-size:13px">
            <span data-i18n="pwd.confirm">Confirmer</span>
            <input id="pwd-confirm" type="password" class="search-input" autocomplete="new-password" />
          </label>
          <p id="pwd-error" style="color:#dc2626;font-size:13px;min-height:18px;margin:0"></p>
        </div>
      </div>
      <div class="modal-footer">
        <span style="flex:1"></span>
        <button class="btn btn-ghost" onclick="closePwdModal()" data-i18n="pwd.cancel">Annuler</button>
        <button class="btn btn-primary" id="pwd-save-btn" onclick="savePwd()" data-i18n="pwd.save">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- Scoring config modal -->
  <div id="scoring-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="scoring-modal-title">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="scoring-modal-title" data-i18n="cfg.title">Configuration du scoring</h2>
        <button class="modal-close btn btn-ghost btn-icon" onclick="closeScoringModal()" aria-label="Fermer">✕</button>
      </div>
      <div class="modal-body" id="scoring-topics"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="addTopicRow()" data-i18n="cfg.addTopic">+ Ajouter un topic</button>
        <span style="flex:1"></span>
        <button class="btn btn-ghost" onclick="closeScoringModal()" data-i18n="cfg.cancel">Annuler</button>
        <button class="btn btn-primary" id="scoring-save-btn" onclick="saveScoringConfig()" data-i18n="cfg.save">⇄ Enregistrer & re-scorer</button>
      </div>
    </div>
  </div>

  <script src="/static/js/i18n.js"></script>
  <script src="/static/js/state.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/render.js"></script>
  <script src="/static/js/ui.js"></script>
</body>
</html>
