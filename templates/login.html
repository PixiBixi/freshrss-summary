<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — FreshRSS Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/login.css" />
</head>
<body>
  <div class="card">
    <div class="logo">FreshRSS Summary</div>
    <div class="subtitle" id="login-subtitle">Connexion requise</div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login{% if request.query_params.get('next') %}?next={{ request.query_params.get('next') }}{% endif %}">
      <label for="username" id="login-username-label">Identifiant</label>
      <input id="username" name="username" type="text" autocomplete="username" autofocus required />

      <label for="password" id="login-password-label">Mot de passe</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit" id="login-submit-btn">Se connecter</button>
    </form>
  </div>
  <script src="/static/js/login.js"></script>
</body>
</html>
